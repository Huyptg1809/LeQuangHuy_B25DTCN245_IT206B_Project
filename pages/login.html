<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rikkei Cinema Login</title>
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">
        <img
          src="../assets/images/IconLogin.png"
          alt="Rikkei Cinema Logo"
          class="logo-image"
        />
        <span class="logo_white">Rikkei</span>Cinema
      </div>
      <ul class="nav-links">
        <li><a href="#">Trang Chủ</a></li>
        <li><a href="#">Thông Tin</a></li>
        <li><a href="#">Liên Hệ</a></li>
      </ul>
      <button class="btn-header-login">Đăng Nhập</button>
    </header>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <main class="main-content">
      <div class="login-card">
        <div class="popcorn-banner"></div>
        <div class="login-title-container">
          <h2 class="login-title">Chào mừng quay trở lại</h2>
          <form id="loginForm" action="#">
            <div class="form-group">
              <label for="email">Email</label>
              <div class="input-wrapper">
                <input
                  type="email"
                  id="email"
                  placeholder="Nhập email của bạn"
                />
                <span class="icon"></span>
              </div>
            </div>

            <div class="form-group">
              <label for="password">Mật khẩu</label>
              <div class="input-wrapper">
                <input
                  type="password"
                  id="password"
                  placeholder="Nhập mật khẩu của bạn"
                />
                <span class="icon"></span>
              </div>
            </div>

            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" /> Ghi nhớ đăng nhập
              </label>
              <a href="#" class="forgot-password">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn-submit">
              Đăng nhập <span>➔</span>
            </button>
          </form>

          <div class="register-text">
            Bạn chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
          </div>
        </div>
      </div>
    </main>

    <script src="../js/login.js"></script>
  </body>
</html>
